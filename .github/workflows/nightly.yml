name: Nightly

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Re-run even if SHA already validated
        type: boolean
        default: false

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUSES=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/statuses \
            --jq '[.[] | select(.context == "full-validation/passed" and .state == "success")] | length')
          if [ "$STATUSES" -gt 0 ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "### Skipped — SHA already validated" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  full-validation:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    uses: ./.github/workflows/full-validation.yml
