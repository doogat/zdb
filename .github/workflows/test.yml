name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Configure git identity
        run: |
          git config --global user.email "ci@zetteldb.dev"
          git config --global user.name "ZettelDB CI"

      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build CLI binary
        run: cargo build -p zdb-cli --bin zdb

      - name: Test
        env:
          PROPTEST_CASES: 50
        run: cargo test --workspace

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        env:
          ZDB_BIN: ${{ github.workspace }}/target/debug/zdb
        run: ./tests/smoke.sh

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        env:
          ZDB_BIN: ${{ github.workspace }}\target\debug\zdb.exe
        run: pwsh -File tests/smoke.ps1
